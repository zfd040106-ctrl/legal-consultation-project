    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect x="48" y="48" width="544" height="264" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <path d="M160 250l74-82 56 58 74-92 116 116H160z" fill="#cbd5e1"/>
