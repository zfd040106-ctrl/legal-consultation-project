<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Image Missing</title>
  <desc id="desc">Placeholder shown when an uploaded image file cannot be found.</desc>
