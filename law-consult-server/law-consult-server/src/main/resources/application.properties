spring.application.name=law-consult-server

# MySQL数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/law_consult?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
mybatis.type-aliases-package=com.example.lawconsultserver.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JPA配置（不使用，仅保留以兼容starter）
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# 日志配置
logging.level.root=INFO
logging.level.com.example.lawconsultserver=DEBUG
logging.level.org.mybatis=DEBUG

# 服务器配置
server.port=8080
server.servlet.context-path=/

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 文件存储路径
app.upload.dir=uploads/
app.upload.base-url=http://localhost:8080/uploads/

# OpenRouter API 配置（使用 DeepSeek 模型）
openrouter.api.key=your_openrouter_api_key
openrouter.api.url=https://openrouter.ai/api/v1/chat/completions
openrouter.model=deepseek/deepseek-chat
openrouter.temperature=0.7
openrouter.max-tokens=1024
